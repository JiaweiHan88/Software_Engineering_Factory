# OTel Collector Configuration for BMAD Copilot Factory
#
# Receives OTLP telemetry from the factory and routes it to:
# - Jaeger (traces)
# - Prometheus (metrics via scrape endpoint)

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: "0.0.0.0:4317"
      http:
        endpoint: "0.0.0.0:4318"

processors:
  batch:
    send_batch_size: 1024
    timeout: 5s

  # Add resource attributes to all telemetry
  resource:
    attributes:
      - key: deployment.environment
        value: local
        action: upsert

exporters:
  # Jaeger — traces
  otlp/jaeger:
    endpoint: "jaeger:4317"
    tls:
      insecure: true

  # Prometheus — metrics (scraped by Prometheus on port 8889)
  prometheus:
    endpoint: "0.0.0.0:8889"
    namespace: bmad
    resource_to_telemetry_conversion:
      enabled: true

  # Debug — logs telemetry to collector stdout (useful for troubleshooting)
  debug:
    verbosity: basic
    sampling_initial: 5
    sampling_thereafter: 200

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch, resource]
      exporters: [otlp/jaeger, debug]
    metrics:
      receivers: [otlp]
      processors: [batch, resource]
      exporters: [prometheus, debug]
